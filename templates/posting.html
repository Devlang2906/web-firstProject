<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Posting Iklan — Unpas Trade</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
        .navbar {
            background: white;
            padding: 16px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 1px 8px rgba(0,0,0,0.08);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .navbar-logo { font-size: 1.4em; font-weight: 800; color: #1e40af; text-decoration: none; }
        .navbar-logo span { color: #f97316; }
        .navbar-menu { display: flex; gap: 28px; align-items: center; }
        .navbar-menu a { color: #555; text-decoration: none; font-size: 0.9em; font-weight: 500; }
        .btn-back { color: #1e40af !important; font-weight: 600 !important; }

        .container { max-width: 900px; margin: 40px auto; padding: 0 20px 60px; }
        .page-title { margin-bottom: 28px; }
        .page-title h1 { font-size: 1.8em; font-weight: 800; color: #1e293b; }
        .page-title p { color: #888; font-size: 0.9em; margin-top: 4px; }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        .section-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.07);
        }
        .section-card.full { grid-column: 1 / -1; }
        .section-header {
            background: linear-gradient(135deg, #1e40af, #2563eb);
            color: white;
            padding: 12px 18px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.95em;
            margin-bottom: 20px;
        }

        .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
        .field:last-child { margin-bottom: 0; }
        .field label { font-size: 0.82em; font-weight: 600; color: #555; }
        .field input, .field textarea, .field select {
            padding: 10px 14px;
            border: 1.5px solid #e0e0e0;
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 0.92em;
            outline: none;
            transition: border 0.2s;
            background: white;
        }
        .field input:focus, .field textarea:focus, .field select:focus { border-color: #1e40af; }
        .field textarea { resize: vertical; min-height: 100px; }

        .prefix-wrap {
            display: flex;
            align-items: center;
            border: 1.5px solid #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            transition: border 0.2s;
        }
        .prefix-wrap:focus-within { border-color: #1e40af; }
        .prefix-wrap span {
            padding: 10px 12px;
            background: #f5f5f5;
            color: #888;
            font-size: 0.85em;
            border-right: 1.5px solid #e0e0e0;
            white-space: nowrap;
        }
        .prefix-wrap input { border: none; border-radius: 0; flex: 1; padding: 10px 12px; }
        .prefix-wrap input:focus { border: none; }

        /* FOTO UPLOAD */
        .foto-drop {
            border: 2px dashed #1e40af;
            border-radius: 12px;
            padding: 32px;
            text-align: center;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 12px;
        }
        .foto-drop:hover { background: #eff6ff; }
        .foto-drop .icon { font-size: 2.5em; margin-bottom: 8px; }
        .foto-drop h3 { font-size: 1em; font-weight: 700; color: #1e40af; margin-bottom: 4px; }
        .foto-drop p { font-size: 0.82em; color: #888; }
        input[type="file"] { display: none; }

        .foto-preview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 8px;
            margin-top: 12px;
        }
        .foto-preview-item {
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            aspect-ratio: 1;
        }
        .foto-preview-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* KONDISI */
        .kondisi-group { display: flex; gap: 10px; }
        .kondisi-btn {
            flex: 1;
            padding: 10px;
            border: 1.5px solid #e0e0e0;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            font-size: 0.88em;
            font-weight: 600;
            color: #888;
            transition: all 0.2s;
        }
        .kondisi-btn.active-baru { border-color: #16a34a; background: #dcfce7; color: #16a34a; }
        .kondisi-btn.active-bekas { border-color: #d97706; background: #fef3c7; color: #d97706; }
        input[name="kondisi"] { display: none; }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #1e40af, #3b82f6);
            color: white;
            border: none;
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-size: 1em;
            font-weight: 700;
            cursor: pointer;
            margin-top: 20px;
            transition: opacity 0.2s;
        }
        .submit-btn:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <div class="navbar">
        <a href="/" class="navbar-logo">Unpas<span>Trade</span></a>
        <div class="navbar-menu">
            <a href="/" class="btn-back">⬅ Kembali</a>
        </div>
    </div>

    <div class="container">
        <div class="page-title">
            <h1>📝 Posting Iklan</h1>
            <p>Isi informasi produkmu — gratis dan langsung tampil!</p>
        </div>

        <form action="/posting" method="POST" enctype="multipart/form-data">
            <div class="form-grid">

                <!-- FOTO -->
                <div class="section-card full">
                    <div class="section-header">📸 Foto Produk</div>
                    <label for="fotos">
                        <div class="foto-drop">
                            <div class="icon">🖼️</div>
                            <h3>Tarik & Lepas Foto Produk di Sini</h3>
                            <p>atau klik untuk pilih foto • Maksimum 5 foto</p>
                        </div>
                    </label>
                    <input type="file" id="fotos" name="fotos" accept="image/*" multiple>
                    <div class="foto-preview-grid" id="previewGrid"></div>
                </div>

                <!-- JUDUL PRODUK -->
                <div class="section-card">
                    <div class="section-header">📦 Judul Produk</div>
                    <div class="field">
                        <label>Nama Produk</label>
                        <input type="text" name="nama" placeholder="Contoh: Sepatu Nike Air Max..." required>
                    </div>
                    <div class="field">
                        <label>Nama Penjual</label>
                        <input type="text" name="nama_penjual" placeholder="Nama kamu..." required>
                    </div>
                    <div class="field">
                        <label>Kategori</label>
                        <select name="kategori">
                            <option value="">-- Pilih Kategori --</option>
                            <option>Pakaian</option>
                            <option>Elektronik</option>
                            <option>Buku & Alat Tulis</option>
                            <option>Makanan & Minuman</option>
                            <option>Kendaraan</option>
                            <option>Kost & Properti</option>
                            <option>Jasa</option>
                            <option>Lainnya</option>
                        </select>
                    </div>
                </div>

                <!-- DETAIL PRODUK -->
                <div class="section-card">
                    <div class="section-header">📋 Detail Produk</div>
                    <div class="field">
                        <label>Kondisi</label>
                        <div class="kondisi-group">
                            <div class="kondisi-btn" id="btnBaru" onclick="pilihKondisi('Baru')">✨ Baru</div>
                            <div class="kondisi-btn" id="btnBekas" onclick="pilihKondisi('Bekas')">♻️ Bekas</div>
                        </div>
                        <input type="text" name="kondisi" id="kondisiInput" placeholder="Pilih kondisi di atas">
                    </div>
                    <div class="field">
                        <label>Deskripsi Lengkap</label>
                        <textarea name="deskripsi" placeholder="Ceritakan kondisi, ukuran, atau info lain..." required></textarea>
                    </div>
                </div>

                <!-- HARGA -->
                <div class="section-card">
                    <div class="section-header">💰 Harga</div>
                    <div class="field">
                        <label>Harga Produk</label>
                        <div class="prefix-wrap">
                            <span>Rp</span>
                            <input type="text" name="harga" placeholder="150.000" required>
                        </div>
                    </div>
                </div>

                <!-- KONTAK -->
                <div class="section-card">
                    <div class="section-header">📞 Kontak Penjual</div>
                    <div class="field">
                        <label>WhatsApp</label>
                        <div class="prefix-wrap">
                            <span>💬</span>
                            <input type="text" name="whatsapp" placeholder="08xxxxxxxxxx">
                        </div>
                    </div>
                    <div class="field">
                        <label>Instagram</label>
                        <div class="prefix-wrap">
                            <span>📸 @</span>
                            <input type="text" name="instagram" placeholder="username">
                        </div>
                    </div>
                    <div class="field">
                        <label>TikTok</label>
                        <div class="prefix-wrap">
                            <span>🎵 @</span>
                            <input type="text" name="tiktok" placeholder="username">
                        </div>
                    </div>
                </div>

            </div>
            <button type="submit" class="submit-btn">🚀 Terbitkan Produk</button>
        </form>
    </div>

    <script>
        // Preview foto
        document.getElementById('fotos').addEventListener('change', function() {
            const grid = document.getElementById('previewGrid');
            grid.innerHTML = '';
            const files = Array.from(this.files).slice(0, 5);
            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const div = document.createElement('div');
                    div.className = 'foto-preview-item';
                    div.innerHTML = `<img src="${e.target.result}">`;
                    grid.appendChild(div);
                };
                reader.readAsDataURL(file);
            });
        });

        // Kondisi
        function pilihKondisi(val) {
            document.getElementById('kondisiInput').value = val;
            document.getElementById('btnBaru').className = 'kondisi-btn' + (val === 'Baru' ? ' active-baru' : '');
            document.getElementById('btnBekas').className = 'kondisi-btn' + (val === 'Bekas' ? ' active-bekas' : '');
        }
    </script>
</body>
</html>
